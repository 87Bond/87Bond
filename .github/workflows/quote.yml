name: Update README quote

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pick a random quote
        run: |
          quote=$(shuf -n 1 .github/quotes.txt)
          {
            echo 'QUOTE<<EOF'
            echo "$quote"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Update README
        run: |
          awk -v quote="$QUOTE" '
            /<!-- quote-start -->/ {
              print
              print "> " quote
              in_block = 1
              next
            }
            /<!-- quote-end -->/ {
              in_block = 0
              print
              next
            }
            !in_block { print }
          ' README.md > README.tmp
          mv README.tmp README.md

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update README quote"
          git push
